<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parte Descalificación</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
padding:15px;
background:#f4f4f4;
}

h2{text-align:center}

input,textarea,select{

width:100%;
padding:10px;
margin-bottom:10px;
font-size:16px;

}

textarea{height:90px}

canvas{

border:1px solid black;
width:100%;
height:200px;
background:white;

}

button{

width:100%;
padding:14px;
font-size:16px;
margin-top:10px;
background:#007bff;
color:white;
border:none;
border-radius:6px;

}

hr{margin:25px 0}

</style>

</head>

<body>

<h2>PARTE DE DESCALIFICACIÓN</h2>

<h3>Datos generales</h3>

<input id="competicion" placeholder="Competición">

<input id="fecha" type="date">

<input id="prueba" placeholder="Prueba">

<input id="dorsal" placeholder="Dorsal">

<hr>

<h3>Juez Auxiliar</h3>

<input id="ja_nombre" placeholder="Nombre">

<select id="ja_regla">

<option value="">Seleccionar regla WA</option>

<option>TR16.5 Salida falsa</option>
<option>TR17.2 Obstrucción</option>
<option>TR17.3 Empujar o bloquear</option>
<option>TR17.4 Abandono de calle</option>
<option>TR17.5 Recorte de distancia</option>
<option>TR18.5 Ayuda externa</option>
<option>TR24.7 Error en relevos</option>
<option>TR24.8 Zona de cambio incorrecta</option>
<option>TR25.19 Intento nulo salto</option>
<option>TR26.7 Intento nulo altura</option>
<option>TR28.12 Intento nulo lanzamiento</option>

</select>

<input id="ja_hora" placeholder="Hora">

<textarea id="ja_incidencia" placeholder="Incidencia"></textarea>

<p>Firma Juez Auxiliar</p>

<canvas id="firmaJA"></canvas>

<button onclick="limpiarFirma('firmaJA')">Limpiar firma</button>

<button onclick="enviarArbitro()">Enviar al árbitro</button>

<hr>

<h3>Juez Árbitro</h3>

<input id="ar_nombre" placeholder="Nombre">

<select id="ar_descalificado">

<option value="">Atleta descalificado</option>
<option>SI</option>
<option>NO</option>

</select>

<select id="ar_regla">

<option value="">Seleccionar regla WA</option>

<option>TR16.5 Salida falsa</option>
<option>TR17.2 Obstrucción</option>
<option>TR17.3 Empujar o bloquear</option>
<option>TR17.4 Abandono de calle</option>
<option>TR17.5 Recorte de distancia</option>
<option>TR18.5 Ayuda externa</option>
<option>TR24.7 Error en relevos</option>
<option>TR24.8 Zona de cambio incorrecta</option>
<option>TR25.19 Intento nulo salto</option>
<option>TR26.7 Intento nulo altura</option>
<option>TR28.12 Intento nulo lanzamiento</option>

</select>

<input id="ar_fecha" type="date">

<input id="ar_hora" type="time">

<textarea id="ar_obs" placeholder="Observaciones"></textarea>

<p>Firma Juez Árbitro</p>

<canvas id="firmaAR"></canvas>

<button onclick="limpiarFirma('firmaAR')">Limpiar firma</button>

<button onclick="generarPDF()">Guardar PDF</button>

<script>

window.onload = function(){

const hoy = new Date().toISOString().split("T")[0];

document.getElementById("fecha").value = hoy;
document.getElementById("ar_fecha").value = hoy;

activarFirma("firmaJA");
activarFirma("firmaAR");

}

function activarFirma(id){

const canvas=document.getElementById(id)

const ctx=canvas.getContext("2d")

canvas.width=canvas.offsetWidth

canvas.height=canvas.offsetHeight

let dibujando=false

canvas.addEventListener("mousedown",()=>{
dibujando=true
guardarHoraFirma(id)
})

canvas.addEventListener("mouseup",()=>dibujando=false)

canvas.addEventListener("mousemove",dibujar)

canvas.addEventListener("touchstart",()=>{
dibujando=true
guardarHoraFirma(id)
})

canvas.addEventListener("touchend",()=>dibujando=false)

canvas.addEventListener("touchmove",dibujar)

function dibujar(e){

if(!dibujando)return

e.preventDefault()

const rect=canvas.getBoundingClientRect()

const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left

const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top

ctx.lineWidth=2

ctx.lineCap="round"

ctx.lineTo(x,y)

ctx.stroke()

ctx.beginPath()

ctx.moveTo(x,y)

}

}

function horaActual(){

const ahora = new Date();

return ahora.getHours().toString().padStart(2,"0")+":"+
ahora.getMinutes().toString().padStart(2,"0");

}

function guardarHoraFirma(id){

const hora = horaActual()

if(id==="firmaJA"){
document.getElementById("ja_hora").value = hora
}

if(id==="firmaAR"){
document.getElementById("ar_hora").value = hora
}

}

function limpiarFirma(id){

const canvas=document.getElementById(id)

canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height)

}

activarFirma("firmaJA")

activarFirma("firmaAR")

function bloquearAuxiliar(){

document.querySelectorAll("#ja_nombre,#ja_regla,#ja_hora,#ja_incidencia")
.forEach(campo => campo.disabled=true)

}

function bloquearFormularioAuxiliar(){

document.querySelectorAll(
"#competicion,#fecha,#prueba,#dorsal,#ja_nombre,#ja_regla,#ja_hora,#ja_incidencia"
).forEach(campo => campo.disabled = true);

const canvas = document.getElementById("firmaJA");
canvas.style.pointerEvents = "none";

}

function enviarArbitro(){

const firmaJA = document.getElementById("firmaJA");

if(firmaJA.toDataURL().length < 2000){
alert("Debe firmar el juez auxiliar");
return;
}

ja_hora.value = horaActual();

const id = Date.now();

const datos = {

competicion:competicion.value,
fecha:fecha.value,
prueba:prueba.value,
dorsal:dorsal.value,

ja_nombre:ja_nombre.value,
ja_regla:ja_regla.value,
ja_hora:ja_hora.value,
ja_incidencia:ja_incidencia.value,

firmaJA:firmaJA.toDataURL()

};

localStorage.setItem("parte_"+id, JSON.stringify(datos));

const url = window.location.href.split("?")[0] + "?id=" + id;

const mensaje = "Completar parte:\n" + url;

window.location.href =
"https://wa.me/?text=" + encodeURIComponent(mensaje);

}

const params=new URLSearchParams(window.location.search)

const firmaJA = document.getElementById("firmaJA");
const firmaAR = document.getElementById("firmaAR");

const id = params.get("id");

if(id){

const datos = JSON.parse(localStorage.getItem("parte_"+id));

if(datos){

competicion.value = datos.competicion;
fecha.value = datos.fecha;
prueba.value = datos.prueba;
dorsal.value = datos.dorsal;

ja_nombre.value = datos.ja_nombre;
ja_regla.value = datos.ja_regla;
ja_hora.value = datos.ja_hora;
ja_incidencia.value = datos.ja_incidencia;

const img = new Image();

img.onload = function(){

const canvas = document.getElementById("firmaJA");
const ctx = canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

};

img.src = datos.firmaJA;

bloquearFormularioAuxiliar();

}

}

async function generarPDF(){

const firmaJA = document.getElementById("firmaJA");
const firmaAR = document.getElementById("firmaAR");

const {jsPDF}=window.jspdf;

const pdf=new jsPDF("p","mm","a4");

pdf.setFontSize(16);
pdf.text("PARTE DE DESCALIFICACIÓN",60,20);

pdf.setFontSize(11);

pdf.text("Competición:",20,35);
pdf.text(competicion.value,50,35);

pdf.text("Fecha:",140,35);
pdf.text(fecha.value,160,35);

pdf.text("Prueba:",20,45);
pdf.text(prueba.value,50,45);

pdf.text("Dorsal:",140,45);
pdf.text(dorsal.value,160,45);

pdf.text("JUEZ AUXILIAR",20,60);

pdf.text("Nombre:",20,70);
pdf.text(ja_nombre.value,50,70);

pdf.text("Regla:",20,80);
pdf.text(ja_regla.value,50,80);

pdf.text("Hora:",140,80);
pdf.text(ja_hora.value,160,80);

pdf.text("Incidencia:",20,95);

pdf.text(ja_incidencia.value,20,105);

pdf.addImage(firmaJA.toDataURL(),"PNG",20,120,60,25);

pdf.text("JUEZ ÁRBITRO",20,160);

pdf.text("Nombre:",20,170);
pdf.text(ar_nombre.value,50,170);

pdf.text("Descalificado:",20,180);
pdf.text(ar_descalificado.value,70,180);

pdf.text("Regla:",20,190);
pdf.text(ar_regla.value,50,190);

pdf.text("Fecha:",140,190);
pdf.text(ar_fecha.value,160,190);

pdf.text("Hora:",180,190);
pdf.text(ar_hora.value,195,190);

pdf.text("Observaciones:",20,205);

pdf.text(ar_obs.value,20,215);

pdf.addImage(firmaAR.toDataURL(),"PNG",20,235,60,25);

pdf.save("parte_descalificacion.pdf");

guardarHistorial();

}

function guardarHistorial(){

let historial = JSON.parse(localStorage.getItem("historial_partes") || "[]");

historial.push({

fecha:new Date().toISOString(),
competicion:competicion.value,
prueba:prueba.value,
dorsal:dorsal.value

});

localStorage.setItem("historial_partes", JSON.stringify(historial));

}

</script>

</body>
</html>
