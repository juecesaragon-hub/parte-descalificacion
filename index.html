<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parte Descalificación</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
padding:15px;
background:#f4f4f4;
}

h2{
text-align:center;
}

input,textarea,select{
width:100%;
padding:10px;
margin-bottom:10px;
font-size:16px;
}

textarea{
height:90px;
}

canvas{
border:1px solid black;
width:100%;
height:200px;
background:white;
}

button{
width:100%;
padding:14px;
font-size:16px;
margin-top:10px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
}

hr{
margin:25px 0;
}

</style>

</head>

<body>

<h2>PARTE DE DESCALIFICACIÓN</h2>

<h3>Datos generales</h3>

<input id="competicion" placeholder="Competición">
<input id="fecha" type="date">
<input id="prueba" placeholder="Prueba">
<input id="dorsal" placeholder="Dorsal">

<hr>

<h3>Juez Auxiliar</h3>

<input id="ja_nombre" placeholder="Nombre">

<input id="ja_regla" placeholder="Regla infringida">

<input id="ja_hora" placeholder="Hora">

<textarea id="ja_incidencia" placeholder="Incidencia"></textarea>

<p>Firma Juez Auxiliar</p>

<canvas id="firmaJA"></canvas>

<button onclick="limpiarFirma('firmaJA')">Limpiar firma</button>

<button onclick="enviarArbitro()">Enviar al Árbitro</button>

<hr>

<h3>Juez Árbitro</h3>

<input id="ar_nombre" placeholder="Nombre">

<select id="ar_descalificado">
<option value="">Atleta descalificado</option>
<option>SI</option>
<option>NO</option>
</select>

<input id="ar_regla" placeholder="Regla">

<input id="ar_fecha" type="date">

<input id="ar_hora" type="time">

<textarea id="ar_obs" placeholder="Observaciones"></textarea>

<p>Firma Juez Árbitro</p>

<canvas id="firmaAR"></canvas>

<button onclick="limpiarFirma('firmaAR')">Limpiar firma</button>

<button onclick="generarPDF()">Guardar PDF</button>

<script>

function activarFirma(id){

const canvas=document.getElementById(id);

const ctx=canvas.getContext("2d");

canvas.width=canvas.offsetWidth;

canvas.height=canvas.offsetHeight;

let dibujando=false;

canvas.addEventListener("mousedown",()=>dibujando=true);

canvas.addEventListener("mouseup",()=>dibujando=false);

canvas.addEventListener("mousemove",dibujar);

canvas.addEventListener("touchstart",()=>dibujando=true);

canvas.addEventListener("touchend",()=>dibujando=false);

canvas.addEventListener("touchmove",dibujar);

function dibujar(e){

if(!dibujando)return;

e.preventDefault();

const rect=canvas.getBoundingClientRect();

const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;

const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

ctx.lineWidth=2;

ctx.lineCap="round";

ctx.lineTo(x,y);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(x,y);

}

}

function limpiarFirma(id){

const canvas=document.getElementById(id);

canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);

}

activarFirma("firmaJA");

activarFirma("firmaAR");

function enviarArbitro(){

const url=window.location.href.split("?")[0]+"?"+

"competicion="+encodeURIComponent(competicion.value)+

"&fecha="+encodeURIComponent(fecha.value)+

"&prueba="+encodeURIComponent(prueba.value)+

"&dorsal="+encodeURIComponent(dorsal.value)+

"&ja_nombre="+encodeURIComponent(ja_nombre.value)+

"&ja_regla="+encodeURIComponent(ja_regla.value)+

"&ja_hora="+encodeURIComponent(ja_hora.value)+

"&ja_incidencia="+encodeURIComponent(ja_incidencia.value);

const mensaje="Completar parte:\n"+url;

window.location.href="https://wa.me/?text="+encodeURIComponent(mensaje);

}

const params=new URLSearchParams(window.location.search);

if(params.get("ja_nombre")){

competicion.value=params.get("competicion");

fecha.value=params.get("fecha");

prueba.value=params.get("prueba");

dorsal.value=params.get("dorsal");

ja_nombre.value=params.get("ja_nombre");

ja_regla.value=params.get("ja_regla");

ja_hora.value=params.get("ja_hora");

ja_incidencia.value=params.get("ja_incidencia");

}

async function generarPDF(){

const {jsPDF}=window.jspdf;

const pdf=new jsPDF();

pdf.text("PARTE DE DESCALIFICACIÓN",20,20);

pdf.text("Competición: "+competicion.value,20,35);

pdf.text("Prueba: "+prueba.value,20,42);

pdf.text("Dorsal: "+dorsal.value,20,49);

pdf.text("Juez Auxiliar: "+ja_nombre.value,20,60);

pdf.addImage(firmaJA.toDataURL(),"PNG",20,65,60,30);

pdf.addPage();

pdf.text("Juez Árbitro: "+ar_nombre.value,20,20);

pdf.text("Descalificado: "+ar_descalificado.value,20,28);

pdf.addImage(firmaAR.toDataURL(),"PNG",20,35,60,30);

pdf.save("parte_descalificacion.pdf");

}

</script>

</body>
</html>
