<script>

document.addEventListener("DOMContentLoaded", iniciarApp);

function iniciarApp(){

const hoy = new Date().toISOString().split("T")[0];

document.getElementById("fecha").value = hoy;
document.getElementById("ar_fecha").value = hoy;

iniciarFirma("firmaJA");
iniciarFirma("firmaAR");

cargarDatosURL();

}

function iniciarFirma(id){

const canvas = document.getElementById(id);
const ctx = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

let dibujando = false;

function obtenerPos(e){

const rect = canvas.getBoundingClientRect();

if(e.touches){
return {
x:e.touches[0].clientX - rect.left,
y:e.touches[0].clientY - rect.top
};
}else{
return {
x:e.clientX - rect.left,
y:e.clientY - rect.top
};
}

}

function empezar(e){

e.preventDefault();

dibujando = true;

const pos = obtenerPos(e);

ctx.beginPath();
ctx.moveTo(pos.x,pos.y);

guardarHoraFirma(id);

}

function dibujar(e){

if(!dibujando) return;

e.preventDefault();

const pos = obtenerPos(e);

ctx.lineWidth = 2;
ctx.lineCap = "round";

ctx.lineTo(pos.x,pos.y);
ctx.stroke();

}

function terminar(){

dibujando = false;

}

canvas.addEventListener("mousedown",empezar);
canvas.addEventListener("mousemove",dibujar);
canvas.addEventListener("mouseup",terminar);
canvas.addEventListener("mouseleave",terminar);

canvas.addEventListener("touchstart",empezar,{passive:false});
canvas.addEventListener("touchmove",dibujar,{passive:false});
canvas.addEventListener("touchend",terminar);

}

function horaActual(){

const ahora = new Date();

return ahora.getHours().toString().padStart(2,"0")+":"+
ahora.getMinutes().toString().padStart(2,"0");

}

function guardarHoraFirma(id){

const hora = horaActual();

if(id==="firmaJA"){
document.getElementById("ja_hora").value = hora;
}

if(id==="firmaAR"){
document.getElementById("ar_hora").value = hora;
}

}

function limpiarFirma(id){

const canvas = document.getElementById(id);
const ctx = canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

}

function cargarDatosURL(){

const params = new URLSearchParams(window.location.search);
const data = params.get("data");

if(!data) return;

const datos = JSON.parse(decodeURIComponent(escape(atob(data))));

competicion.value = datos.c;
fecha.value = datos.f;
prueba.value = datos.p;
dorsal.value = datos.d;

ja_nombre.value = datos.jn;
ja_regla.value = datos.jr;
ja_hora.value = datos.jh;
ja_incidencia.value = datos.ji;

const img = new Image();

img.onload = function(){

const canvas = document.getElementById("firmaJA");
const ctx = canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

};

img.src = datos.fs;

bloquearFormularioAuxiliar();

}

function bloquearFormularioAuxiliar(){

document.querySelectorAll(
"#competicion,#fecha,#prueba,#dorsal,#ja_nombre,#ja_regla,#ja_hora,#ja_incidencia"
).forEach(campo => campo.disabled = true);

const canvas = document.getElementById("firmaJA");
canvas.style.pointerEvents = "none";

}

function enviarArbitro(){

const canvas = document.getElementById("firmaJA");

if(canvas.toDataURL().length < 2000){
alert("Debe firmar el juez auxiliar");
return;
}

ja_hora.value = horaActual();

const datos = {

c:competicion.value,
f:fecha.value,
p:prueba.value,
d:dorsal.value,

jn:ja_nombre.value,
jr:ja_regla.value,
jh:ja_hora.value,
ji:ja_incidencia.value,

fs:canvas.toDataURL()

};

const datosJSON = JSON.stringify(datos);

const datosCodificados = btoa(unescape(encodeURIComponent(datosJSON)));

const url = window.location.href.split("?")[0] + "?data=" + datosCodificados;

const mensaje = "Completar parte:\n" + url;

window.location.href =
"https://wa.me/?text=" + encodeURIComponent(mensaje);

}

</script>
