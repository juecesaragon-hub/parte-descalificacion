<script>

window.onload = iniciarApp;

function iniciarApp(){

// FECHA ACTUAL
const hoy = new Date();
const fechaHoy =
hoy.getFullYear() + "-" +
String(hoy.getMonth()+1).padStart(2,"0") + "-" +
String(hoy.getDate()).padStart(2,"0");

document.getElementById("fecha").value = fechaHoy;
document.getElementById("ar_fecha").value = fechaHoy;

// INICIAR FIRMAS
configurarCanvas("firmaJA");
configurarCanvas("firmaAR");

// CARGAR DATOS SI VIENEN EN URL
cargarDatosURL();

}

function configurarCanvas(id){

const canvas = document.getElementById(id);
const ctx = canvas.getContext("2d");

// AJUSTAR TAMAÑO REAL
canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

ctx.lineWidth = 2;
ctx.lineCap = "round";

let dibujando = false;

function posicion(e){

const rect = canvas.getBoundingClientRect();

if(e.touches){

return {
x:e.touches[0].clientX - rect.left,
y:e.touches[0].clientY - rect.top
};

}else{

return {
x:e.clientX - rect.left,
y:e.clientY - rect.top
};

}

}

function empezar(e){

e.preventDefault();

dibujando = true;

const pos = posicion(e);

ctx.beginPath();
ctx.moveTo(pos.x,pos.y);

guardarHoraFirma(id);

}

function dibujar(e){

if(!dibujando) return;

e.preventDefault();

const pos = posicion(e);

ctx.lineTo(pos.x,pos.y);
ctx.stroke();

}

function terminar(){

dibujando = false;

}

canvas.addEventListener("mousedown", empezar);
canvas.addEventListener("mousemove", dibujar);
canvas.addEventListener("mouseup", terminar);
canvas.addEventListener("mouseleave", terminar);

canvas.addEventListener("touchstart", empezar, {passive:false});
canvas.addEventListener("touchmove", dibujar, {passive:false});
canvas.addEventListener("touchend", terminar);

}

String(ahora.getMinutes()).padStart(2,"0");

}

function guardarHoraFirma(id){

if(id==="firmaJA"){
document.getElementById("ja_hora").value = horaActual();
}

if(id==="firmaAR"){
document.getElementById("ar_hora").value = horaActual();
}

}

function limpiarFirma(id){

const canvas = document.getElementById(id);
const ctx = canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

}

function cargarDatosURL(){

const params = new URLSearchParams(window.location.search);
const data = params.get("data");

if(!data) return;

const datos = JSON.parse(decodeURIComponent(escape(atob(data))));

document.getElementById("competicion").value = datos.c;
document.getElementById("fecha").value = datos.f;
document.getElementById("prueba").value = datos.p;
document.getElementById("dorsal").value = datos.d;

document.getElementById("ja_nombre").value = datos.jn;
document.getElementById("ja_regla").value = datos.jr;
document.getElementById("ja_hora").value = datos.jh;
document.getElementById("ja_incidencia").value = datos.ji;

const canvas = document.getElementById("firmaJA");
const ctx = canvas.getContext("2d");

const img = new Image();

img.onload = function(){
ctx.drawImage(img,0,0,canvas.width,canvas.height);
};

img.src = datos.fs;

bloquearFormularioAuxiliar();

}

function bloquearFormularioAuxiliar(){

document.querySelectorAll(
"#competicion,#fecha,#prueba,#dorsal,#ja_nombre,#ja_regla,#ja_hora,#ja_incidencia"
).forEach(campo => campo.disabled = true);

document.getElementById("firmaJA").style.pointerEvents = "none";

}

function enviarArbitro(){

const canvas = document.getElementById("firmaJA");

if(canvas.toDataURL().length < 2000){

alert("Debe firmar el juez auxiliar");
return;

}

f:fecha.value,
p:prueba.value,
d:dorsal.value,

jn:ja_nombre.value,
jr:ja_regla.value,
jh:ja_hora.value,
ji:ja_incidencia.value,

fs:canvas.toDataURL()

};

const datosJSON = JSON.stringify(datos);
const datosCodificados = btoa(unescape(encodeURIComponent(datosJSON)));

const url = window.location.href.split("?")[0] + "?data=" + datosCodificados;

const mensaje = "Completar parte:\n" + url;

window.location.href =
"https://wa.me/?text=" + encodeURIComponent(mensaje);

}

</script>
