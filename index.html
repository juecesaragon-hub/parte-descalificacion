<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parte Descalificación</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
padding:15px;
background:#f4f4f4;
}

h2{
text-align:center;
}

input,textarea,select{
width:100%;
padding:10px;
margin-bottom:10px;
font-size:16px;
}

textarea{
height:90px;
}

canvas{
border:1px solid black;
width:100%;
height:200px;
background:white;
}

button{
width:100%;
padding:14px;
font-size:16px;
margin-top:10px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
}

hr{
margin:25px 0;
}

</style>

</head>

<body>

<h2>PARTE DE DESCALIFICACIÓN</h2>

<h3>Datos generales</h3>

<input id="competicion" placeholder="Competición">
<input id="fecha" type="date">
<input id="prueba" placeholder="Prueba">
<input id="dorsal" placeholder="Dorsal">

<hr>

<h3>Juez Auxiliar</h3>

<input id="ja_nombre" placeholder="Nombre">

<input id="ja_regla" placeholder="Regla infringida">

<input id="ja_hora" placeholder="Hora">

<textarea id="ja_incidencia" placeholder="Incidencia"></textarea>

<p>Firma Juez Auxiliar</p>

<canvas id="firmaJA"></canvas>

<button onclick="limpiarFirma('firmaJA')">Limpiar firma</button>

<button onclick="enviarArbitro()">Enviar al Árbitro</button>

<hr>

<h3>Juez Árbitro</h3>

<input id="ar_nombre" placeholder="Nombre">

<select id="ar_descalificado">
<option value="">Atleta descalificado</option>
<option>SI</option>
<option>NO</option>
</select>

<input id="ar_regla" placeholder="Regla">

<input id="ar_fecha" type="date">

<input id="ar_hora" type="time">

<textarea id="ar_obs" placeholder="Observaciones"></textarea>

<p>Firma Juez Árbitro</p>

<canvas id="firmaAR"></canvas>

<button onclick="limpiarFirma('firmaAR')">Limpiar firma</button>

<button onclick="generarPDF()">Guardar PDF</button>

<script>

function activarFirma(id){

const canvas=document.getElementById(id);

const ctx=canvas.getContext("2d");

canvas.width=canvas.offsetWidth;

canvas.height=canvas.offsetHeight;

let dibujando=false;

canvas.addEventListener("mousedown",()=>dibujando=true);

canvas.addEventListener("mouseup",()=>dibujando=false);

canvas.addEventListener("mousemove",dibujar);

canvas.addEventListener("touchstart",()=>dibujando=true);

canvas.addEventListener("touchend",()=>dibujando=false);

canvas.addEventListener("touchmove",dibujar);

function dibujar(e){

if(!dibujando)return;

e.preventDefault();

const rect=canvas.getBoundingClientRect();

const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;

const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

ctx.lineWidth=2;

ctx.lineCap="round";

ctx.lineTo(x,y);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(x,y);

}

}

function limpiarFirma(id){

const canvas=document.getElementById(id);

canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);

}

activarFirma("firmaJA");

activarFirma("firmaAR");

function enviarArbitro(){

const id = Date.now().toString();

const datos = {

competicion: competicion.value,
fecha: fecha.value,
prueba: prueba.value,
dorsal: dorsal.value,

ja_nombre: ja_nombre.value,
ja_regla: ja_regla.value,
ja_hora: ja_hora.value,
ja_incidencia: ja_incidencia.value,

firmaJA: document.getElementById("firmaJA").toDataURL()

};

localStorage.setItem("parte_"+id, JSON.stringify(datos));

const enlace = window.location.origin + window.location.pathname + "?id=" + id;

const mensaje = "Completar parte:\n" + enlace;

window.location.href = "https://wa.me/?text=" + encodeURIComponent(mensaje);

}

const params=new URLSearchParams(window.location.search);

const id = params.get("id");

if(id){

const datos = JSON.parse(localStorage.getItem("parte_"+id));

if(datos){

competicion.value = datos.competicion;
fecha.value = datos.fecha;
prueba.value = datos.prueba;
dorsal.value = datos.dorsal;

ja_nombre.value = datos.ja_nombre;
ja_regla.value = datos.ja_regla;
ja_hora.value = datos.ja_hora;
ja_incidencia.value = datos.ja_incidencia;

const img = new Image();

img.onload = function(){

const canvas = document.getElementById("firmaJA");
const ctx = canvas.getContext("2d");

ctx.drawImage(img,0,0);

};

img.src = datos.firmaJA;

}
}

const firmaGuardada = params.get("firmaJA");

if (firmaGuardada) {

const img = new Image();

img.onload = function(){

const canvas = document.getElementById("firmaJA");
const ctx = canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

};

img.src = firmaGuardada;

}

if(params.get("ja_nombre")){

competicion.value=params.get("competicion");

fecha.value=params.get("fecha");

prueba.value=params.get("prueba");

dorsal.value=params.get("dorsal");

ja_nombre.value=params.get("ja_nombre");

ja_regla.value=params.get("ja_regla");

ja_hora.value=params.get("ja_hora");

ja_incidencia.value=params.get("ja_incidencia");

}

async function generarPDF(){

const {jsPDF}=window.jspdf;

const pdf=new jsPDF("p","mm","a4");

pdf.setFontSize(12);

pdf.text("PARTE DE DESCALIFICACIÓN",60,20);

pdf.text("Competición: "+competicion.value,20,35);
pdf.text("Fecha: "+fecha.value,120,35);

pdf.text("Prueba: "+prueba.value,20,45);
pdf.text("Dorsal: "+dorsal.value,120,45);

pdf.text("JUEZ AUXILIAR",20,60);

pdf.text("Nombre: "+ja_nombre.value,20,70);
pdf.text("Regla: "+ja_regla.value,20,80);
pdf.text("Hora: "+ja_hora.value,120,80);

pdf.text("Incidencia:",20,90);
pdf.text(ja_incidencia.value,20,100);

const firma1=firmaJA.toDataURL("image/png");

pdf.addImage(firma1,"PNG",20,120,60,25);

pdf.text("JUEZ ÁRBITRO",20,160);

pdf.text("Nombre: "+ar_nombre.value,20,170);

pdf.text("Descalificado: "+ar_descalificado.value,20,180);

pdf.text("Regla: "+ar_regla.value,20,190);

pdf.text("Fecha: "+ar_fecha.value,120,190);

pdf.text("Hora: "+ar_hora.value,160,190);

pdf.text("Observaciones:",20,205);

pdf.text(ar_obs.value,20,215);

const firma2=firmaAR.toDataURL("image/png");

pdf.addImage(firma2,"PNG",20,235,60,25);

pdf.save("parte_descalificacion.pdf");

}

</script>

</body>
</html>
